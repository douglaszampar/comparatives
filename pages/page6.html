<script>

/* ===========================
EDITAR SOMENTE AQUI
=========================== */

const activity = {
questions:[
{
sentence:"Which city is more beautiful: the one you live in or another city you know? Why?",
followups:[
"What places in each city are the most beautiful?",
"Is each one more beautiful during the day or at night?"
]
},
{
sentence:"Is junk food worse for people than sugary drinks? Why?",
followups:[
"Are eating habits worse today than 20 years ago?",
"What is one bad eating habit people should change?"
]
}
]
}

/* ===========================
CREATE QUESTIONS
=========================== */

const container = document.getElementById("questions")

activity.questions.forEach((q,i)=>{

const div = document.createElement("div")
div.className="sentence"

div.innerHTML = `
<div class="dropzone" data-question="${i}"></div>
${q.sentence}
`

container.appendChild(div)

})

/* ===========================
DRAG AND DROP
=========================== */

const drags = document.querySelectorAll(".drag")
const drops = document.querySelectorAll(".dropzone")

drags.forEach(d => {

d.addEventListener("dragstart", e=>{
e.dataTransfer.setData("text", e.target.id)
})

})

drops.forEach(zone =>{

zone.addEventListener("dragover", e=>{
e.preventDefault()
})

zone.addEventListener("drop", e=>{

e.preventDefault()

const id = e.dataTransfer.getData("text")

zone.textContent = id.charAt(0).toUpperCase()+id.slice(1)
zone.dataset.role = id

})

})

/* ===========================
DISCUSSION SYSTEM
=========================== */

let assignments = []
let current = 0

function startDiscussion(){

assignments = []

for(let zone of drops){

const qIndex = zone.dataset.question
const role = zone.dataset.role

if(!role){

alert("Assign Student or Teacher to each question.")
return

}

assignments.push({
role: role,
question: qIndex
})

}

document.getElementById("activity").classList.add("hidden")
document.getElementById("discussion").classList.remove("hidden")

showRole()

}

function showRole(){

const roleTitle = document.getElementById("roleTitle")
const text = document.getElementById("discussionText")

const item = assignments[current]
const q = activity.questions[item.question]

roleTitle.innerText =
item.role.charAt(0).toUpperCase()+item.role.slice(1)+" talks"

let html = `<p>${q.sentence}</p>`

q.followups.forEach(f=>{
html += `<div class="followup">• ${f}</div>`
})

text.innerHTML = html

}

function nextRole(){

current++

if(current < assignments.length){

showRole()

}else{

location.reload()

}

}

</script>
